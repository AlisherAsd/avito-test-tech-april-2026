services:
  backend:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      port: "8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE_API_URL: http://localhost:8080
        VITE_OPENROUTER_API_KEY: ${VITE_OPENROUTER_API_KEY}
    ports:
      - "3000:80"
    depends_on:
      - backend